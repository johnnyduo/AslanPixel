<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Background shield -->
  <rect x="8" y="4" width="48" height="4" fill="#00d4ff"/>
  <rect x="4" y="8" width="56" height="4" fill="#00d4ff"/>
  <rect x="4" y="12" width="56" height="32" fill="#0a0a0f"/>
  <rect x="4" y="44" width="56" height="4" fill="#00d4ff"/>
  <rect x="8" y="48" width="48" height="4" fill="#00d4ff"/>
  <rect x="16" y="52" width="32" height="4" fill="#00d4ff"/>
  <rect x="24" y="56" width="16" height="4" fill="#00d4ff"/>

  <!-- Inner shield border -->
  <rect x="8" y="8" width="4" height="36" fill="#00d4ff" opacity="0.3"/>
  <rect x="52" y="8" width="4" height="36" fill="#00d4ff" opacity="0.3"/>

  <!-- Letter A - pixel art -->
  <!-- Left vertical -->
  <rect x="18" y="18" width="4" height="20" fill="#00d4ff"/>
  <!-- Right vertical -->
  <rect x="42" y="18" width="4" height="20" fill="#00d4ff"/>
  <!-- Top horizontal -->
  <rect x="22" y="14" width="20" height="4" fill="#00d4ff"/>
  <!-- Middle bar -->
  <rect x="22" y="28" width="20" height="4" fill="#00d4ff"/>

  <!-- Gold accent dots - pixel sparkles -->
  <rect x="28" y="20" width="4" height="4" fill="#ffd700" opacity="0.9"/>
  <rect x="32" y="16" width="4" height="4" fill="#ffd700" opacity="0.6"/>
</svg>
