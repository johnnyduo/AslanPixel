name: aslan_pixel
description: Aslan Pixel — Social Financial Network + Idle Pixel World + Broker-connected Portfolio App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Firebase
  firebase_core: ^4.2.0
  firebase_auth: ^6.1.1
  cloud_firestore: ^6.0.3
  firebase_storage: ^13.0.3
  firebase_crashlytics: ^5.0.3
  firebase_messaging: ^16.0.3
  firebase_analytics: ^12.0.3
  firebase_performance: ^0.11.1+1
  firebase_remote_config: ^6.2.0
  cloud_functions: ^6.0.3

  # Game engine
  flame: ^1.21.0

  # UI & Responsive
  sizer: ^3.0.5
  google_fonts: ^8.0.2
  flutter_svg: ^2.2.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  loading_animation_widget: ^1.3.0
  flutter_easyloading: ^3.0.5
  page_transition: ^2.2.1
  photo_view: ^0.15.0
  dotted_border: ^3.1.0
  animated_text_kit: ^4.3.0
  auto_size_text: ^3.0.0

  # Charts (from AslanApp reference)
  fl_chart: ^1.1.1
  syncfusion_flutter_charts: ^33.1.44

  # Auth providers
  google_sign_in: ^7.1.1
  sign_in_with_apple: ^7.0.1

  # Pixel art tools
  image: ^4.6.0
  flutter_colorpicker: ^1.1.0
  image_picker: ^1.1.2

  # AI
  google_generative_ai: ^0.4.7
  firebase_ai: ^3.6.1

  # HTTP
  http: ^1.2.0

  # Utilities
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^10.0.0
  flutter_dotenv: ^6.0.0
  url_launcher: ^6.3.2
  permission_handler: ^12.0.1
  intl: ^0.20.2
  crypto: ^3.0.6
  device_info_plus: ^12.3.0
  package_info_plus: any
  path_provider: ^2.1.5

  # Notifications
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

  # Navigation & misc
  get: ^4.7.2
  lazy_load_scrollview: ^1.3.0
  awesome_dialog: ^3.2.1
  fluttertoast: ^9.0.0
  app_version_update: ^6.2.0
  audioplayers: ^6.1.0
  model_viewer_plus: ^1.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  fake_cloud_firestore: ^4.0.0
  firebase_auth_mocks: ^0.15.0
  build_runner: ^2.4.13

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env
    - .env.development
    - .env.production
    - assets/images/
    - assets/icons/
    - assets/sprites/
    - assets/sprites/agents/
    - assets/sprites/avatars/
    - assets/sprites/npcs/
    - assets/sprites/lpc_npcs/
    - assets/sprites/room_backgrounds/
    - assets/sprites/room_items/furniture/
    - assets/sprites/room_items/decorations/
    - assets/sprites/room_items/technology/
    - assets/sprites/room_items/special/
    - assets/sprites/effects/
    - assets/sprites/ui/
    - assets/3d/characters/
    - assets/3d/furniture/
    - assets/3d/resources/
    - assets/3d/city/
    - assets/3d/forest/
    - assets/3d/prototype/
    - assets/3d/skeleton/
    - assets/3d/scenes/
    - assets/sprites/3d_thumbnails/
    - assets/tiles/
    - assets/audio/
